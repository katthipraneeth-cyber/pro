<!DOCTYPE html>
<html>
<head>
    <title>KLH University</title>
    <style>
        body{
    background-color: #7b6fd6;
    color: white;
    font-family: Arial;
    text-align: center;
}
.table {
    width: 95%;
    margin: 20px auto;
    border-collapse: collapse;
    background-color: #9891d7;
    padding: 15px;
    border-radius: 12px;

}

.box {
    background-color: #8f85e8;
    width: 300px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 10px;
    margin-top: 10px;
    margin-right: 15px;
}
.box:hover{
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(249,52,52,0.3);
}
.box1{
    background-color: #8f85e8;
    width: 300px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 10px;
    margin-left: 15px;
}
.box1:hover{
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(249,52,52,0.3);
}

button {
    background-color: pink;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
}
button:hover {
    background-color: #df6f80;
}
.display{
    display: flex;
    flex-direction: row;
}
    </style>
</head>
<body>
<div class="table">
    <h1>Welcome to KLH University - Excellence in Education</h1>
</div>
<div class="display">
    <div class="box">
        <h2>Computer Science</h2>
        <p>Learn technology and innovation.</p>
        <button>Learn More</button>
    </div>

    <div class="box1">
        <h2>Engineering</h2>
        <p>Build the future with engineering.</p>
        <button>Learn More</button>
    </div>
</div>
<div class="display">
    <div class="box">
        <h2>Business Studies</h2>
        <p>Develop business and leadership skills.</p>
        <button>Learn More</button>
    </div>

    <div class="box1">
        <h2>Medicine</h2>
        <p>Start a career in healthcare.</p>
        <button>Learn More</button>
    </div>
    </div>

</body>
</html>
